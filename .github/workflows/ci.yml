name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ts
    # Lock the suite offline: the tests are fully deterministic and must never
    # reach a live model. Leaving PRECEPT_INFERENCE unset forces the inference
    # layer down its offline (abstaining) path.
    env:
      ANTHROPIC_API_KEY: ""
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: install
        run: bun install --frozen-lockfile
      - name: types
        run: bun run typecheck
      - name: dependency-rule fitness function
        run: bun run arch
      - name: tests (includes the repo privacy gate)
        run: bun test
