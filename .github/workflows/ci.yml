name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.13"]
    # Lock the suite offline: the tests and eval are fully deterministic and must never
    # reach a live model. An empty key forces the inference layer down its offline path.
    env:
      ANTHROPIC_API_KEY: ""
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: install
        run: pip install -e ".[dev]"
      - name: lint
        run: ruff check precept/ tests/
      - name: types
        run: mypy
      - name: tests (includes the repo privacy gate)
        run: pytest -q
      - name: enforcement eval (gate — fails on any miss or false-block)
        run: precept evals --strict
